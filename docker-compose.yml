# CF IP Monitor — Docker Compose
#
# 快速开始:
#   cp deploy/docker/.env.example .env
#   cp config.example.yaml config.yaml   # 按需修改 auth_token 等
#   # 下载 IP 库到 src/cf_ip_monitor/ipdata/ (见 README)
#   docker compose build
#   docker compose up -d master
#   docker compose --profile agents up -d agent-ct
#
# 仅 Master:
#   docker compose up -d master
#
# 多 Agent (电信 / 联通 / 移动):
#   docker compose --profile agents up -d

name: cf-ip-monitor

services:
  master:
    build:
      context: .
      dockerfile: Dockerfile
      target: master
    image: cf-ip-monitor/master:latest
    container_name: cf-ip-master
    restart: unless-stopped
    ports:
      - "${MASTER_PORT:-8088}:8088"
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MASTER_AUTH_TOKEN: ${MASTER_AUTH_TOKEN:-}
      HUAWEICLOUD_AK: ${HUAWEICLOUD_AK:-}
      HUAWEICLOUD_SK: ${HUAWEICLOUD_SK:-}
      HUAWEICLOUD_ZONE_ID: ${HUAWEICLOUD_ZONE_ID:-}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - master-data:/app/data
      - master-output:/app/output
      # IP 离线库 (GeoLite2 / dbip / ip2region / qqwry) 放宿主机同目录, 挂到镜像内 /app/ipdata
      # 运行时通过环境变量 CF_IPDATA_DIR=/app/ipdata 指向该目录 (Dockerfile 已默认设置)
      - ./src/cf_ip_monitor/ipdata:/app/ipdata:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/healthz', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

  agent-ct:
    profiles: [agents]
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    image: cf-ip-monitor/agent:latest
    container_name: cf-ip-agent-ct
    restart: unless-stopped
    depends_on:
      master:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # 同 compose 网络内: agent 通过服务名 "master" 访问 master 容器的 8088
      AGENT_MASTER_URL: ${AGENT_MASTER_URL:-http://master:8088}
      # AGENT_AUTH_TOKEN 留空时, runner 会自动 fallback 到 MASTER_AUTH_TOKEN (同机 compose 场景常用)
      AGENT_AUTH_TOKEN: ${AGENT_AUTH_TOKEN:-}
      MASTER_AUTH_TOKEN: ${MASTER_AUTH_TOKEN:-}
      AGENT_ISP: ${AGENT_CT_ISP:-电信}
      AGENT_NODE_NAME: ${AGENT_CT_NODE_NAME:-ct-docker-01}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    cap_add:
      - NET_RAW
    security_opt:
      - no-new-privileges:true

  agent-cu:
    profiles: [agents]
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    image: cf-ip-monitor/agent:latest
    container_name: cf-ip-agent-cu
    restart: unless-stopped
    depends_on:
      master:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AGENT_MASTER_URL: ${AGENT_MASTER_URL:-http://master:8088}
      AGENT_AUTH_TOKEN: ${AGENT_AUTH_TOKEN:-}
      MASTER_AUTH_TOKEN: ${MASTER_AUTH_TOKEN:-}
      AGENT_ISP: ${AGENT_CU_ISP:-联通}
      AGENT_NODE_NAME: ${AGENT_CU_NODE_NAME:-cu-docker-01}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    cap_add:
      - NET_RAW
    security_opt:
      - no-new-privileges:true

  agent-cm:
    profiles: [agents]
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    image: cf-ip-monitor/agent:latest
    container_name: cf-ip-agent-cm
    restart: unless-stopped
    depends_on:
      master:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AGENT_MASTER_URL: ${AGENT_MASTER_URL:-http://master:8088}
      AGENT_AUTH_TOKEN: ${AGENT_AUTH_TOKEN:-}
      MASTER_AUTH_TOKEN: ${MASTER_AUTH_TOKEN:-}
      AGENT_ISP: ${AGENT_CM_ISP:-移动}
      AGENT_NODE_NAME: ${AGENT_CM_NODE_NAME:-cm-docker-01}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    cap_add:
      - NET_RAW
    security_opt:
      - no-new-privileges:true

  # ----------------------------------------------------------
  # nginx 反代 (公网 HTTPS 入口, profile=edge)
  # 用法:
  #   1) cp deploy/nginx/master.conf.example deploy/nginx/master.conf  (改 server_name)
  #   2) 放证书到 deploy/nginx/certs/{fullchain,privkey}.pem
  #      或 ./scripts/gen-self-signed-cert.sh master.example.com 自签
  #   3) docker compose --profile edge up -d nginx
  # ----------------------------------------------------------
  nginx:
    profiles: [edge]
    image: nginx:1.27-alpine
    container_name: cf-ip-nginx
    restart: unless-stopped
    depends_on:
      master:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/master.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
      - nginx-logs:/var/log/nginx
    security_opt:
      - no-new-privileges:true

volumes:
  master-data:
  master-output:
  nginx-logs:
