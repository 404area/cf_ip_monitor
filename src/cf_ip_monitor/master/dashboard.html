<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CF IP Monitor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f0f2f5;font-size:.92rem}
.navbar-brand{font-weight:700;letter-spacing:.5px}
.nav-tabs .nav-link{color:#495057;padding:.5rem 1rem}
.nav-tabs .nav-link.active{font-weight:600;color:#0d6efd}
.card{border:none;box-shadow:0 1px 4px rgba(0,0,0,.08);border-radius:.5rem}
.card-header{background:#fff;border-bottom:1px solid #f0f0f0;font-weight:600;border-radius:.5rem .5rem 0 0!important}
.table-sm td,.table-sm th{padding:.3rem .6rem;font-size:.84rem}
.badge-ok{background:#198754!important}.badge-fail{background:#dc3545!important}
.lat-good{color:#198754;font-weight:600}.lat-warn{color:#e67e22;font-weight:600}.lat-bad{color:#dc3545;font-weight:600}
.score-wrap{min-width:90px}.score-bar{height:5px;background:#e9ecef;border-radius:3px;margin-top:2px}
.score-fill{height:5px;border-radius:3px;background:linear-gradient(90deg,#0d6efd,#0dcaf0)}
.line-cn2gia{background:#198754!important}.line-cu9929{background:#0d6efd!important}
.line-cn2gt{background:#20c997!important;color:#000!important}.line-cmi{background:#6f42c1!important}
.line-other{background:#6c757d!important}
.stage-sample{background:#0d6efd!important}.stage-expand{background:#0dcaf0!important;color:#000!important}
.stage-http_trace{background:#fd7e14!important}.stage-speed{background:#198754!important}
.stage-traceroute{background:#6f42c1!important}
.stat-card{text-align:center;padding:1rem .5rem}
.stat-card .stat-val{font-size:1.6rem;font-weight:700;line-height:1}
.stat-card .stat-label{color:#6c757d;font-size:.8rem;margin-top:.25rem}
#toast-container{position:fixed;bottom:1rem;right:1rem;z-index:9999}
#ipdataAlert code{font-size:.8rem}
</style>
</head>
<body>

<!-- Auth Modal -->
<div class="modal fade" id="authModal" data-bs-backdrop="static" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white py-2">
        <h6 class="modal-title mb-0">🔐 CF IP Monitor 登录</h6>
      </div>
      <div class="modal-body">
        <p class="text-muted small mb-2">请输入 config.yaml 中的 <code>auth_token</code></p>
        <input type="password" class="form-control form-control-sm" id="tokenInput" placeholder="输入 Bearer Token">
        <div id="authErr" class="text-danger small mt-1" style="display:none">Token 错误，请重试</div>
      </div>
      <div class="modal-footer py-2">
        <button class="btn btn-primary btn-sm w-100" onclick="doLogin()">确认登录</button>
      </div>
    </div>
  </div>
</div>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary py-2 px-3">
  <span class="navbar-brand mb-0">☁ CF IP Monitor</span>
  <div class="d-flex align-items-center gap-2">
    <span class="text-white-50 small" id="refreshTs"></span>
    <button class="btn btn-sm btn-outline-light" onclick="manualRefresh()">⟳ 刷新</button>
    <button class="btn btn-sm btn-outline-light" onclick="clearToken()">退出</button>
  </div>
</nav>

<div id="ipdataAlert" class="container-fluid mt-2" style="display:none"></div>

<!-- Tabs -->
<div class="container-fluid mt-3 pb-4">
  <ul class="nav nav-tabs mb-3" id="mainTabs" role="tablist">
    <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tOverview"  onclick="loadOverview()">📊 概览</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tBestIps"  onclick="loadBestIps()">⭐ 优选IP</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tRounds"   onclick="loadRounds()">🔄 轮次历史</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tSegments" onclick="loadSegments()">📡 C段状态</button></li>
    <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tProbes"   onclick="loadProbes()">🔍 探测明细</button></li>
  </ul>

  <div class="tab-content">

    <!-- ===== Tab 概览 ===== -->
    <div class="tab-pane fade show active" id="tOverview">
      <div class="row g-3" id="overviewContent">
        <div class="col-12 text-center text-muted py-5">加载中...</div>
      </div>
    </div>

    <!-- ===== Tab 优选IP ===== -->
    <div class="tab-pane fade" id="tBestIps">
      <div class="card mb-3">
        <div class="card-body py-2">
          <div class="d-flex flex-wrap gap-2 align-items-center">
            <span class="fw-semibold me-1">运营商:</span>
            <div id="ispBtns" class="btn-group btn-group-sm">
              <button class="btn btn-outline-secondary active" onclick="filterIsp(this,'')">全部</button>
            </div>
            <input type="text" class="form-control form-control-sm ms-auto" style="max-width:200px"
                   id="ipSearch" placeholder="搜索 IP / 地区..." oninput="renderBestIps()">
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-sm table-hover mb-0">
              <thead class="table-dark">
                <tr>
                  <th>IP 地址</th><th>运营商</th><th>地区</th>
                  <th>延迟 p50</th><th>速度</th><th>评分</th>
                  <th>线路类型</th><th>出口城市</th><th>快照时间</th>
                </tr>
              </thead>
              <tbody id="bestIpsBody">
                <tr><td colspan="9" class="text-center text-muted py-4">加载中...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Tab 轮次历史 ===== -->
    <div class="tab-pane fade" id="tRounds">
      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-sm table-hover mb-0">
              <thead class="table-dark">
                <tr><th>轮次 ID</th><th>状态</th><th>开始时间</th><th>完成时间</th><th>耗时</th><th>备注</th></tr>
              </thead>
              <tbody id="roundsBody"><tr><td colspan="6" class="text-center text-muted py-4">加载中...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Tab C段状态 ===== -->
    <div class="tab-pane fade" id="tSegments">
      <div class="row g-3" id="segmentsContent">
        <div class="col-12 text-center text-muted py-5">加载中...</div>
      </div>
    </div>

    <!-- ===== Tab 探测明细 ===== -->
    <div class="tab-pane fade" id="tProbes">
      <div class="card mb-3">
        <div class="card-body py-2">
          <div class="d-flex flex-wrap gap-2 align-items-center">
            <select class="form-select form-select-sm" style="max-width:130px" id="fIsp" onchange="loadProbes()">
              <option value="">全部运营商</option>
              <option value="电信">电信</option>
              <option value="联通">联通</option>
              <option value="移动">移动</option>
            </select>
            <select class="form-select form-select-sm" style="max-width:160px" id="fKind" onchange="loadProbes()">
              <option value="">全部类型</option>
              <option value="tcp_ping">TCP_PING</option>
              <option value="http_trace">HTTP_TRACE</option>
              <option value="speed">SPEED</option>
              <option value="traceroute">TRACEROUTE</option>
            </select>
            <input type="text" class="form-control form-control-sm" style="max-width:180px"
                   id="fIp" placeholder="IP 地址过滤">
            <select class="form-select form-select-sm" style="max-width:100px" id="fLimit" onchange="probeOffset=0;loadProbes()">
              <option value="200">200 条</option>
              <option value="500" selected>500 条</option>
              <option value="1000">1000 条</option>
            </select>
            <button class="btn btn-sm btn-primary" onclick="probeOffset=0;loadProbes()">查询</button>
            <button class="btn btn-sm btn-outline-secondary" id="probeMoreBtn" style="display:none" onclick="loadMoreProbes()">加载更多</button>
            <span class="text-muted small ms-auto" id="probeCount"></span>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-sm table-hover mb-0">
              <thead class="table-dark">
                <tr>
                  <th>时间</th><th>IP</th><th>运营商</th><th>节点</th>
                  <th>类型</th><th>结果</th><th>延迟</th><th>Jitter</th>
                  <th>速度</th><th>Colo</th><th>阶段</th>
                </tr>
              </thead>
              <tbody id="probesBody"><tr><td colspan="11" class="text-center text-muted py-4">加载中...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

  </div><!-- tab-content -->
</div><!-- container -->

<!-- Toast -->
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ===================== Auth =====================
const TK = 'cfim_token';
const getToken = () => localStorage.getItem(TK) || '';
const setToken = t => localStorage.setItem(TK, t);
function clearToken() { localStorage.removeItem(TK); showAuth(); }
function showAuth() {
  document.getElementById('tokenInput').value = '';
  document.getElementById('authErr').style.display = 'none';
  new bootstrap.Modal(document.getElementById('authModal')).show();
}
async function doLogin() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) return;
  try {
    const r = await fetch('/api/ui/overview', { headers: { 'Authorization': 'Bearer ' + t } });
    if (r.ok) {
      setToken(t);
      bootstrap.Modal.getInstance(document.getElementById('authModal'))?.hide();
      loadOverview();
    } else {
      document.getElementById('authErr').style.display = 'block';
    }
  } catch { document.getElementById('authErr').style.display = 'block'; }
}
document.getElementById('tokenInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ===================== API =====================
async function api(path, params = {}) {
  const url = new URL(path, location.href);
  Object.entries(params).forEach(([k, v]) => { if (v !== '' && v != null) url.searchParams.set(k, v); });
  const r = await fetch(url, { headers: { 'Authorization': 'Bearer ' + getToken() } });
  if (r.status === 401) { clearToken(); throw new Error('401'); }
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

// ===================== Utils =====================
function fmtTime(ms) {
  if (!ms) return '-';
  return new Date(ms).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
function fmtMs(v)   { return v == null ? '-' : v.toFixed(1) + 'ms'; }
function probeLat(r) {
  const v = r.latency_p50 ?? r.latency_ms;
  if (v == null) return '-';
  const tag = r.kind === 'tcp_ping' ? 'TCP' : r.kind === 'http_trace' ? 'HTTP' : '';
  return fmtMs(v) + (tag ? ` <span class="text-muted" style="font-size:.7rem">${tag}</span>` : '');
}
function fmtMbps(v) { return v == null ? '-' : v.toFixed(1) + ' MB/s'; }
function fmtDur(a, b) {
  if (!a || !b) return '-';
  const s = Math.round((b - a) / 1000);
  return s < 3600 ? `${Math.floor(s / 60)}m ${s % 60}s` : `${Math.floor(s / 3600)}h ${Math.floor(s % 3600 / 60)}m`;
}
function latClass(v) { return v == null ? '' : v < 80 ? 'lat-good' : v < 150 ? 'lat-warn' : 'lat-bad'; }
function lineTag(t) {
  const m = { 'CN2-GIA': 'cn2gia', 'CU-9929': 'cu9929', 'CN2-GT': 'cn2gt', 'CMI': 'cmi' };
  return t ? `<span class="badge line-${m[t] || 'other'}">${t}</span>` : '<span class="text-muted">-</span>';
}
function stageTag(s) {
  return s ? `<span class="badge stage-${s}" style="font-size:.75rem">${s}</span>` : '-';
}
function scoreHtml(s) {
  if (s == null) return '-';
  const w = Math.round(s * 100);
  return `<div class="score-wrap"><small class="fw-semibold">${s.toFixed(3)}</small><div class="score-bar"><div class="score-fill" style="width:${w}%"></div></div></div>`;
}
function toast(msg, type = 'danger') {
  const el = document.createElement('div');
  el.className = `alert alert-${type} alert-dismissible py-2 px-3 mb-2 shadow-sm`;
  el.innerHTML = `${msg}<button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>`;
  document.getElementById('toast-container').prepend(el);
  setTimeout(() => el.remove(), 5000);
}
function errRow(cols, msg) { return `<tr><td colspan="${cols}" class="text-center text-danger py-3">${msg}</td></tr>`; }
function emptyRow(cols, msg = '暂无数据') { return `<tr><td colspan="${cols}" class="text-center text-muted py-4">${msg}</td></tr>`; }

// ===================== Tab 1: 概览 =====================
async function loadOverview() {
  try {
    const [ov, st] = await Promise.all([
      api('/api/ui/overview'),
      api('/api/ui/probe_stats', { hours: 24 }),
    ]);
    renderOverview(ov, st);
    document.getElementById('refreshTs').textContent = '刷新于 ' + new Date().toLocaleTimeString('zh-CN');
  } catch (e) { if (e.message !== '401') toast('概览加载失败: ' + e.message); }
}

function renderOverview(ov, st) {
  const isps = ov.isps || [];
  const pending = ov.pending_by_isp || {};
  const prog = ov.round_progress;
  let html = '';

  // ---- IP 库缺失告警 ----
  const missing = ov.ipdata_missing || [];
  const alertEl = document.getElementById('ipdataAlert');
  if (missing.length) {
    const names = { asn: 'GeoLite2-ASN', city: 'GeoLite2-City', country: 'GeoLite2-Country',
                    dbip: 'dbip-city-ipv4', ip2region: 'ip2region', qqwry: 'qqwry' };
    const list = missing.map(k => names[k] || k).join(', ');
    alertEl.style.display = 'block';
    alertEl.innerHTML = `<div class="alert alert-warning py-2 mb-0 shadow-sm">
      <strong>⚠ IP 离线库未就绪</strong> — 缺失: ${list}。
      地区/线路/路由富化将不可用。请运行 <code>./scripts/download_ipdata.sh</code> 下载
      (MaxMind 需手动注册后下载 GeoLite2 系列)。
    </div>`;
  } else {
    alertEl.style.display = 'none';
    alertEl.innerHTML = '';
  }

  // ---- 统计卡片行 ----
  const totalPending = Object.values(pending).reduce((a, b) => a + b, 0);
  const ispCount = isps.length;
  html += `<div class="col-6 col-md-3"><div class="card stat-card">
    <div class="stat-val text-primary">${ispCount}</div>
    <div class="stat-label">监控 ISP 数</div></div></div>`;
  html += `<div class="col-6 col-md-3"><div class="card stat-card">
    <div class="stat-val ${totalPending > 0 ? 'text-warning' : 'text-success'}">${totalPending.toLocaleString()}</div>
    <div class="stat-label">待处理任务</div></div></div>`;
  html += `<div class="col-6 col-md-3"><div class="card stat-card">
    <div class="stat-val ${ov.current_round ? 'text-success' : 'text-muted'}">${ov.current_round ? '运行中' : '空闲'}</div>
    <div class="stat-label">扫描状态</div></div></div>`;
  const roundState = prog ? prog.state : '-';
  html += `<div class="col-6 col-md-3"><div class="card stat-card">
    <div class="stat-val text-info" style="font-size:1rem;padding-top:.3rem">${ov.current_round ? ov.current_round.slice(0, 8) + '...' : '-'}</div>
    <div class="stat-label">当前轮次 ID</div></div></div>`;

  // ---- 当前轮次进度 ----
  html += '<div class="col-12 col-lg-7"><div class="card h-100"><div class="card-header">🔄 当前轮次进度</div><div class="card-body">';
  if (!ov.current_round) {
    html += '<p class="text-muted mb-0">暂无进行中的轮次</p>';
  } else {
    const stateBadge = prog?.state === 'running'
      ? '<span class="badge bg-success">运行中</span>'
      : '<span class="badge bg-secondary">已完成</span>';
    html += `<div class="d-flex justify-content-between align-items-center mb-2">
      <span class="font-monospace small text-muted">ID: ${ov.current_round}</span>${stateBadge}</div>`;
    if (prog?.started_at)
      html += `<div class="text-muted small mb-2">开始时间: ${fmtTime(prog.started_at)}</div>`;
    if (prog?.by_stage) {
      const stageOrder = ['sample', 'expand', 'http_trace', 'speed', 'traceroute'];
      html += '<table class="table table-sm mb-0"><thead><tr><th>阶段</th>';
      isps.forEach(isp => html += `<th>${isp}</th>`);
      html += '</tr></thead><tbody>';
      stageOrder.forEach(stage => {
        const sd = prog.by_stage[stage];
        if (!sd) return;
        html += `<tr><td>${stageTag(stage)}</td>`;
        isps.forEach(isp => {
          const d = sd[isp] || {};
          const done = d.done || 0, pend = d.pending || 0, asgn = d.assigned || 0;
          const total = done + pend + asgn;
          const pct = total > 0 ? Math.round(done / total * 100) : 0;
          const barClass = pct === 100 ? 'bg-success' : pct > 0 ? 'bg-primary' : 'bg-secondary';
          html += `<td><div class="progress" style="height:6px;min-width:60px">
            <div class="progress-bar ${barClass}" style="width:${pct}%"></div></div>
            <small class="text-muted">${done}/${total} (${pct}%)</small></td>`;
        });
        html += '</tr>';
      });
      html += '</tbody></table>';
    }
  }
  html += '</div></div></div>';

  // ---- 待处理任务 ----
  html += '<div class="col-12 col-lg-5"><div class="card h-100"><div class="card-header">📋 任务队列</div><div class="card-body">';
  if (!Object.keys(pending).length) {
    html += '<p class="text-success mb-0">✓ 所有任务已处理完成</p>';
  } else {
    html += '<table class="table table-sm mb-0"><thead><tr><th>运营商</th><th>待处理</th><th>进度</th></tr></thead><tbody>';
    Object.entries(pending).forEach(([isp, n]) => {
      html += `<tr><td>${isp}</td><td><span class="badge bg-warning text-dark">${n.toLocaleString()}</span></td>
        <td><div class="progress" style="height:6px;width:80px"><div class="progress-bar bg-warning" style="width:100%"></div></div></td></tr>`;
    });
    html += '</tbody></table>';
  }
  html += '</div></div></div>';

  // ---- 近24小时探测统计 ----
  html += '<div class="col-12"><div class="card"><div class="card-header">📈 近 24 小时探测统计</div><div class="card-body p-0"><div class="table-responsive">';
  html += '<table class="table table-sm table-hover mb-0"><thead class="table-light"><tr><th>运营商</th><th>类型</th><th>总量</th><th>成功</th><th>成功率</th><th>平均延迟</th><th>平均速度</th></tr></thead><tbody>';
  const stats = st.stats || {};
  let hasData = false;
  const kindOrder = ['tcp_ping', 'http_trace', 'speed', 'traceroute'];
  Object.entries(stats).sort().forEach(([isp, kinds]) => {
    kindOrder.forEach(kind => {
      const d = kinds[kind];
      if (!d) return;
      hasData = true;
      const rate = d.total > 0 ? Math.round(d.ok / d.total * 100) : 0;
      const rc = rate >= 90 ? 'text-success' : rate >= 70 ? 'text-warning' : 'text-danger';
      html += `<tr><td><strong>${isp}</strong></td><td>${stageTag(kind)}</td>
        <td>${d.total.toLocaleString()}</td><td>${d.ok.toLocaleString()}</td>
        <td class="${rc} fw-semibold">${rate}%</td>
        <td class="${latClass(d.avg_lat_ms)}">${fmtMs(d.avg_lat_ms)}</td>
        <td>${fmtMbps(d.avg_speed_mbps)}</td></tr>`;
    });
  });
  if (!hasData) html += emptyRow(7);
  html += '</tbody></table></div></div></div></div>';

  document.getElementById('overviewContent').innerHTML = html;
}

function manualRefresh() {
  const tab = document.querySelector('#mainTabs .nav-link.active');
  if (tab) tab.click();
}

// ===================== Tab 2: 优选IP =====================
let _bestData = [], _selIsp = '';

async function loadBestIps() {
  document.getElementById('bestIpsBody').innerHTML = emptyRow(9, '加载中...');
  try {
    const d = await api('/api/ui/best_ips', { limit: 500 });
    _bestData = d.best_ips || [];
    buildIspBtns();
    renderBestIps();
  } catch (e) {
    document.getElementById('bestIpsBody').innerHTML = errRow(9, e.message);
  }
}

function buildIspBtns() {
  const isps = [...new Set(_bestData.map(r => r.isp))].sort();
  let html = '<button class="btn btn-outline-secondary active" onclick="filterIsp(this,\'\')">全部</button>';
  isps.forEach(isp => html += `<button class="btn btn-outline-secondary" onclick="filterIsp(this,'${isp}')">${isp}</button>`);
  document.getElementById('ispBtns').innerHTML = html;
}

function filterIsp(btn, isp) {
  _selIsp = isp;
  document.querySelectorAll('#ispBtns .btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBestIps();
}

function renderBestIps() {
  const q = (document.getElementById('ipSearch').value || '').toLowerCase();
  const rows = _bestData.filter(r => {
    if (_selIsp && r.isp !== _selIsp) return false;
    if (q && !r.ip.includes(q) && !(r.region || '').toLowerCase().includes(q)) return false;
    return true;
  });
  if (!rows.length) { document.getElementById('bestIpsBody').innerHTML = emptyRow(9, '无匹配数据'); return; }
  let html = '';
  rows.forEach(r => {
    html += `<tr>
      <td class="font-monospace">${r.ip}</td>
      <td>${r.isp || '-'}</td>
      <td>${r.region || '-'}</td>
      <td class="${latClass(r.latency_p50)}">${fmtMs(r.latency_p50)}</td>
      <td>${fmtMbps(r.speed_p50)}</td>
      <td>${scoreHtml(r.score)}</td>
      <td>${lineTag(r.line_type)}</td>
      <td>${r.exit_city || '<span class="text-muted">-</span>'}</td>
      <td class="text-muted small">${fmtTime(r.snapshot_at)}</td>
    </tr>`;
  });
  document.getElementById('bestIpsBody').innerHTML = html;
}

// ===================== Tab 3: 轮次历史 =====================
async function loadRounds() {
  document.getElementById('roundsBody').innerHTML = emptyRow(6, '加载中...');
  try {
    const d = await api('/api/ui/rounds', { limit: 20 });
    const rounds = d.rounds || [];
    if (!rounds.length) { document.getElementById('roundsBody').innerHTML = emptyRow(6); return; }
    let html = '';
    rounds.forEach(r => {
      const badge = r.state === 'running'
        ? '<span class="badge bg-success">运行中</span>'
        : r.state === 'done'
          ? '<span class="badge bg-secondary">已完成</span>'
          : '<span class="badge bg-danger">中止</span>';
      html += `<tr>
        <td class="font-monospace small">${r.round_id}</td>
        <td>${badge}</td>
        <td class="small">${fmtTime(r.started_at)}</td>
        <td class="small">${r.finished_at ? fmtTime(r.finished_at) : '<span class="text-muted">-</span>'}</td>
        <td class="small">${fmtDur(r.started_at, r.finished_at)}</td>
        <td class="small text-muted">${r.notes || ''}</td>
      </tr>`;
    });
    document.getElementById('roundsBody').innerHTML = html;
  } catch (e) { document.getElementById('roundsBody').innerHTML = errRow(6, e.message); }
}

// ===================== Tab 4: C段状态 =====================
async function loadSegments() {
  document.getElementById('segmentsContent').innerHTML = '<div class="col-12 text-center text-muted py-5">加载中...</div>';
  try {
    const d = await api('/api/ui/segments');
    const segs = d.segments || {};
    if (!Object.keys(segs).length) {
      document.getElementById('segmentsContent').innerHTML = '<div class="col-12 text-center text-muted py-5">暂无数据，等待首次扫描...</div>';
      return;
    }
    let html = `<div class="col-12"><div class="alert alert-info py-2 small mb-0">
      C 段状态按 <strong>/24 网段</strong> 统计 (采样 .1/.65/.129/.193 四个点),
      与单个 IP 的 ping/TCP 结果可能不一致。探测成功指 <strong>TCP 443 可连通</strong>, 不代表 ICMP ping 通。
    </div></div>`;
    Object.entries(segs).forEach(([isp, s]) => {
      const total = s.total || 1;
      const alive = s.alive || 0, silent = s.silent || 0, expired = s.expired || 0;
      const unknown = Math.max(0, total - alive - silent - expired);
      const aliveRate = Math.round(alive / total * 100);
      function bar(val, cls) {
        const pct = Math.round(val / total * 100);
        return `<div class="d-flex justify-content-between align-items-center mb-1 small">
          <span>${val.toLocaleString()} 段</span><span class="text-muted">${pct}%</span></div>
          <div class="progress mb-2" style="height:8px">
            <div class="progress-bar ${cls}" style="width:${pct}%"></div></div>`;
      }
      html += `<div class="col-12 col-md-6 col-xl-4">
        <div class="card h-100">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span>${isp}</span>
            <span class="text-muted fw-normal small">共 ${total.toLocaleString()} 段 · 存活率 <strong class="text-success">${aliveRate}%</strong></span>
          </div>
          <div class="card-body">
            <div class="small fw-semibold text-success mb-1">✓ 存活 (alive)</div>${bar(alive, 'bg-success')}
            <div class="small fw-semibold text-danger mb-1">✗ 沉默有效 (silent)</div>${bar(silent, 'bg-danger')}
            <div class="small fw-semibold text-warning mb-1">⌛ 沉默已过期 (expired)</div>${bar(expired, 'bg-warning')}
            ${unknown > 0 ? `<div class="small fw-semibold text-muted mb-1">? 未探测</div>${bar(unknown, 'bg-secondary')}` : ''}
          </div>
        </div>
      </div>`;
    });
    document.getElementById('segmentsContent').innerHTML = html;
  } catch (e) {
    document.getElementById('segmentsContent').innerHTML = `<div class="col-12 text-danger p-3">${e.message}</div>`;
  }
}

// ===================== Tab 5: 探测明细 =====================
let probeOffset = 0;
let probeRows = [];

async function loadProbes(append = false) {
  if (!append) {
    probeOffset = 0;
    probeRows = [];
    document.getElementById('probesBody').innerHTML = emptyRow(11, '加载中...');
  }
  const isp  = document.getElementById('fIsp').value;
  const kind = document.getElementById('fKind').value;
  const ip   = document.getElementById('fIp').value.trim();
  const limit = parseInt(document.getElementById('fLimit').value, 10) || 500;
  try {
    const d = await api('/api/ui/probe_recent', { limit, offset: probeOffset, isp, kind, ip: ip || undefined });
    const rows = d.probes || [];
    const total = d.total ?? rows.length;
    probeRows = append ? probeRows.concat(rows) : rows;
    probeOffset += rows.length;
    const moreBtn = document.getElementById('probeMoreBtn');
    moreBtn.style.display = probeOffset < total ? 'inline-block' : 'none';
    document.getElementById('probeCount').textContent =
      `显示 ${probeRows.length.toLocaleString()} / 共 ${total.toLocaleString()} 条`;
    if (!probeRows.length) { document.getElementById('probesBody').innerHTML = emptyRow(11); return; }
    let html = '';
    probeRows.forEach(r => {
      const okBadge = r.ok ? '<span class="badge badge-ok">OK</span>' : '<span class="badge badge-fail">FAIL</span>';
      const lat = r.latency_p50 ?? r.latency_ms;
      html += `<tr>
        <td class="small text-muted text-nowrap">${fmtTime(r.measured_at)}</td>
        <td class="font-monospace small">${r.ip}</td>
        <td>${r.isp || '-'}</td>
        <td class="small text-muted">${r.node_name || '-'}</td>
        <td>${stageTag(r.kind)}</td>
        <td>${okBadge}</td>
        <td class="${latClass(lat)}">${probeLat(r)}</td>
        <td class="small text-muted">${r.kind === 'tcp_ping' ? fmtMs(r.jitter_ms) : '-'}</td>
        <td>${fmtMbps(r.speed_mbps)}</td>
        <td>${r.colo ? `<span class="badge bg-info text-dark">${r.colo}</span>` : '-'}</td>
        <td>${stageTag(r.stage)}</td>
      </tr>`;
    });
    document.getElementById('probesBody').innerHTML = html;
  } catch (e) { document.getElementById('probesBody').innerHTML = errRow(11, e.message); }
}

function loadMoreProbes() { loadProbes(true); }

// ===================== Init =====================
window.addEventListener('load', () => {
  if (!getToken()) showAuth();
  else loadOverview();
  // 概览 30 秒自动刷新
  setInterval(() => {
    if (document.querySelector('#tOverview.active.show')) loadOverview();
  }, 30000);
});
</script>
