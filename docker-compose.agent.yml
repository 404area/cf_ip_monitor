# 在远程 VPS 上单独跑 Agent (Master 已在别处部署)
#
# 用法:
#   export AGENT_MASTER_URL=https://your-master:8088
#   export AGENT_ISP=电信
#   export AGENT_NODE_NAME=ct-vps-01
#   docker compose -f docker-compose.agent.yml up -d

name: cf-ip-monitor-agent

services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    image: cf-ip-monitor/agent:latest
    container_name: cf-ip-agent
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    command:
      - cf-ip-agent
      - --config
      - /app/config.yaml
      - --master-url
      - ${AGENT_MASTER_URL:?set AGENT_MASTER_URL}
      - --isp
      - ${AGENT_ISP:?set AGENT_ISP}
      - --node-name
      - ${AGENT_NODE_NAME:?set AGENT_NODE_NAME}
    cap_add:
      - NET_RAW
    security_opt:
      - no-new-privileges:true
